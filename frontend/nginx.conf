events {}

http {
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # API routing
        location /api/user/ {
            proxy_pass http://user-service:8081/;
        }

        location /api/summary/ {
            proxy_pass http://summary-service:8082/;
        }

        location /api/vote/ {
            proxy_pass http://vote-service:8083/;
        }

        location /api/comment/ {
            proxy_pass http://comment-service:8084/;
        }

        location /api/saved/ {
            proxy_pass http://saved-service:8085/;
        }

        location /api/recommendation/ {
            proxy_pass http://recommendation-service:8086/;
        }

        location /api/circle/ {
            proxy_pass http://circle-service:8087/;
        }
    }
}
