spring.application.name=recommendation-service
server.port=8086

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:recommendationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Profile
spring.profiles.active=docker

# External Services
services.user.base-url=http://user-service:8081
services.summary.base-url=http://summary-service:8082
services.vote.base-url=http://vote-service:8083
services.comment.base-url=http://comment-service:8084
services.saved.base-url=http://saved-service:8085

# Recommendation Algorithm Settings
recommendation.content-weight=0.6
recommendation.collaborative-weight=0.4
recommendation.min-interactions=3
recommendation.max-recommendations=20
recommendation.decay-factor=0.95

